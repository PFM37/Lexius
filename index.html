<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lexius</title>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <link rel="stylesheet" href="css/index.css">
    <style>
        .tab {
            padding: 10px;
            border-radius: 15px 15px 0 0;
            border: 1px solid white;
            border-bottom: transparent;
            cursor: pointer;
            margin-right: 5px;
            background-color: #222;
            color: white;
        }
        .active-tab {
            background-color: #333;
        }
        textarea.ta {
            width: 100%;
            height: 300px;
            background-color: #111;
            color: white;
            border: none;
            padding: 10px;
            font-family: monospace;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <nav style="display: flex; justify-content: space-between; padding: 10px;">
        <div>
            <img src="res/logo/logo.svg" alt="">
            <button onclick="Save()"><img id="lex" src="res/logo/Lexius.png" alt=""></button>
        </div>
        <div>
            <img src="res/images/save.svg" style="width: 42px;">
            <button onclick="rota()">
                <img id="run" src="res/logo/logo.svg" class="run" alt="">
            </button>
        </div>
    </nav>

    <div style="display: flex; align-items: center; text-align: center;">
        <div class="tab">index.html</div>
        <div class="tab">style.css</div>
        <div class="tab">script.js</div>
        <div class="tab">+</div>
    </div>

    <div>
        <textarea class="ta"></textarea>
    </div>
    <script src="scripts/index.js"></script>
</body>
</html>
